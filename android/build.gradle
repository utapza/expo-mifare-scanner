apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

group = 'expo.modules'
version = '1.0.0'

buildscript {
  def expoModulesCorePlugin = new File(project(":expo-modules-core").projectDir, "ExpoModulesCorePlugin.gradle")
  if (expoModulesCorePlugin.exists()) {
    apply from: expoModulesCorePlugin
    applyKotlinExpoModulesCorePlugin()
  }
}

android {
  namespace "expo.modules.mifarescanner"
  // Use rootProject.ext values (set by Expo's build system when autolinked)
  // Fallback to defaults if not available (shouldn't happen in normal Expo projects)
  compileSdkVersion rootProject.ext.hasProperty("compileSdkVersion") ? rootProject.ext.compileSdkVersion : 35

  defaultConfig {
    minSdkVersion rootProject.ext.hasProperty("minSdkVersion") ? rootProject.ext.minSdkVersion : 24
    targetSdkVersion rootProject.ext.hasProperty("targetSdkVersion") ? rootProject.ext.targetSdkVersion : 34
  }

  lintOptions {
    abortOnError false
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = JavaVersion.VERSION_17.majorVersion
  }
}

dependencies {
  implementation project(':expo-modules-core')
  implementation 'com.facebook.react:react-native'
}
